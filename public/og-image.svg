<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="50%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Geometric pattern -->
  <g opacity="0.06">
    <circle cx="100" cy="100" r="200" fill="white"/>
    <circle cx="1100" cy="530" r="250" fill="white"/>
    <circle cx="900" cy="50" r="150" fill="white"/>
  </g>
  
  <!-- Islamic geometric accent -->
  <g opacity="0.08" transform="translate(50, 50)">
    <polygon points="60,0 78,42 120,42 86,66 98,108 60,82 22,108 34,66 0,42 42,42" fill="white"/>
  </g>
  <g opacity="0.05" transform="translate(1050, 450)">
    <polygon points="60,0 78,42 120,42 86,66 98,108 60,82 22,108 34,66 0,42 42,42" fill="white" transform="scale(1.5)"/>
  </g>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  
  <!-- Book icon -->
  <g transform="translate(100, 180)">
    <path d="M60 20 L60 200 Q30 180 0 200 L0 40 Q30 20 60 20 Z" fill="white" opacity="0.85"/>
    <path d="M60 20 L60 200 Q90 180 120 200 L120 40 Q90 20 60 20 Z" fill="white" opacity="0.9"/>
    <line x1="60" y1="20" x2="60" y2="200" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="15" y1="70" x2="48" y2="65" stroke="#059669" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="15" y1="100" x2="48" y2="95" stroke="#059669" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="15" y1="130" x2="40" y2="125" stroke="#059669" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="72" y1="65" x2="105" y2="70" stroke="#059669" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="72" y1="95" x2="105" y2="100" stroke="#059669" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="72" y1="125" x2="100" y2="130" stroke="#059669" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-1">
    TahaLearn
  </text>
  
  <!-- Arabic subtitle -->
  <text x="300" y="310" font-family="system-ui, sans-serif" font-size="40" fill="#6ee7b7" direction="rtl" unicode-bidi="bidi-override">
    وَقُل رَّبِّ زِدْنِي عِلْمًا
  </text>
  
  <!-- Description -->
  <text x="300" y="380" font-family="system-ui, sans-serif" font-size="28" fill="#d1fae5" opacity="0.9">
    Plateforme d'apprentissage des sciences islamiques
  </text>
  
  <!-- Tags -->
  <g transform="translate(300, 420)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#10b981" opacity="0.3"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-size="16" fill="#a7f3d0" text-anchor="middle">Tajweed</text>
    
    <rect x="135" y="0" width="90" height="36" rx="18" fill="#10b981" opacity="0.3"/>
    <text x="180" y="24" font-family="system-ui, sans-serif" font-size="16" fill="#a7f3d0" text-anchor="middle">Fiqh</text>
    
    <rect x="240" y="0" width="120" height="36" rx="18" fill="#10b981" opacity="0.3"/>
    <text x="300" y="24" font-family="system-ui, sans-serif" font-size="16" fill="#a7f3d0" text-anchor="middle">Aqeedah</text>
    
    <rect x="375" y="0" width="110" height="36" rx="18" fill="#10b981" opacity="0.3"/>
    <text x="430" y="24" font-family="system-ui, sans-serif" font-size="16" fill="#a7f3d0" text-anchor="middle">Seerah</text>
    
    <rect x="500" y="0" width="110" height="36" rx="18" fill="#10b981" opacity="0.3"/>
    <text x="555" y="24" font-family="system-ui, sans-serif" font-size="16" fill="#a7f3d0" text-anchor="middle">Hadith</text>
  </g>
  
  <!-- Footer line -->
  <rect x="300" y="500" width="600" height="2" fill="#10b981" opacity="0.4"/>
  
  <!-- Footer text -->
  <text x="300" y="540" font-family="system-ui, sans-serif" font-size="20" fill="#6ee7b7" opacity="0.7">
    100% Gratuit  •  FR / AR / EN  •  Coran &amp; Sunna
  </text>
  
  <!-- URL -->
  <text x="300" y="580" font-family="system-ui, sans-serif" font-size="18" fill="#d1fae5" opacity="0.5">
    www.tahalearn.com
  </text>
  
  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>