<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.2"
     baseProfile="tiny-ps"
     viewBox="0 0 512 512"
     width="512"
     height="512">
  <title>TahaLearn</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Open Book -->
  <g transform="translate(106, 106)">
    <!-- Left page -->
    <path d="M150 55 L150 255 Q75 220 20 255 L20 75 Q75 40 150 55 Z"
          fill="white" fill-opacity="0.9"/>
    <!-- Right page -->
    <path d="M150 55 L150 255 Q225 220 280 255 L280 75 Q225 40 150 55 Z"
          fill="white" fill-opacity="0.95"/>

    <!-- Book spine -->
    <line x1="150" y1="55" x2="150" y2="255" stroke="white" stroke-width="6" stroke-opacity="0.5"/>

    <!-- Text lines left -->
    <line x1="45" y1="110" x2="120" y2="100" stroke="#059669" stroke-width="6" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="45" y1="145" x2="120" y2="135" stroke="#059669" stroke-width="6" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="45" y1="180" x2="105" y2="170" stroke="#059669" stroke-width="6" stroke-linecap="round" stroke-opacity="0.5"/>

    <!-- Text lines right -->
    <line x1="180" y1="100" x2="255" y2="110" stroke="#059669" stroke-width="6" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="180" y1="135" x2="255" y2="145" stroke="#059669" stroke-width="6" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="195" y1="170" x2="255" y2="180" stroke="#059669" stroke-width="6" stroke-linecap="round" stroke-opacity="0.5"/>
  </g>
</svg>
