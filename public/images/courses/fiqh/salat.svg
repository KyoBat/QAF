<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="salatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#salatGrad)" opacity="0.1"/>
  
  <!-- Prayer Rug -->
  <g filter="url(#shadow)">
    <!-- Main rug body -->
    <rect x="50" y="80" width="100" height="70" rx="4" fill="url(#salatGrad)"/>
    
    <!-- Decorative border -->
    <rect x="55" y="85" width="90" height="60" rx="2" fill="none" stroke="#d1fae5" stroke-width="2" opacity="0.6"/>
    <rect x="60" y="90" width="80" height="50" rx="2" fill="none" stroke="#d1fae5" stroke-width="1" opacity="0.4"/>
    
    <!-- Mihrab arch pattern -->
    <g transform="translate(100, 110)">
      <path d="M -20 10 L -20 -5 Q -20 -15, -10 -15 L 10 -15 Q 20 -15, 20 -5 L 20 10" 
            fill="none" 
            stroke="#d1fae5" 
            stroke-width="2" 
            opacity="0.7"/>
      <path d="M -15 10 L -15 0 Q -15 -10, -7 -10 L 7 -10 Q 15 -10, 15 0 L 15 10" 
            fill="none" 
            stroke="#d1fae5" 
            stroke-width="1.5" 
            opacity="0.5"/>
    </g>
    
    <!-- Tassels at bottom -->
    <g opacity="0.8">
      <line x1="60" y1="150" x2="60" y2="158" stroke="url(#darkGreen)" stroke-width="2"/>
      <line x1="75" y1="150" x2="75" y2="158" stroke="url(#darkGreen)" stroke-width="2"/>
      <line x1="90" y1="150" x2="90" y2="158" stroke="url(#darkGreen)" stroke-width="2"/>
      <line x1="110" y1="150" x2="110" y2="158" stroke="url(#darkGreen)" stroke-width="2"/>
      <line x1="125" y1="150" x2="125" y2="158" stroke="url(#darkGreen)" stroke-width="2"/>
      <line x1="140" y1="150" x2="140" y2="158" stroke="url(#darkGreen)" stroke-width="2"/>
    </g>
  </g>
  
  <!-- "5×" daily prayers indicator -->
  <g filter="url(#shadow)">
    <text x="100" y="55" 
          font-family="Arial, sans-serif" 
          font-size="36" 
          font-weight="bold" 
          fill="url(#salatGrad)" 
          text-anchor="middle"
          stroke="#065f46"
          stroke-width="0.5">5×</text>
    <text x="100" y="55" 
          font-family="Arial, sans-serif" 
          font-size="36" 
          font-weight="bold" 
          fill="url(#salatGrad)" 
          text-anchor="middle">5×</text>
  </g>
  
  <!-- "SALAT" label -->
  <text x="100" y="175" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        font-weight="600" 
        fill="url(#darkGreen)" 
        text-anchor="middle"
        letter-spacing="2">SALAT</text>
  
  <!-- Decorative sparkles/stars -->
  <g opacity="0.6">
    <circle cx="35" cy="50" r="2" fill="#10b981"/>
    <circle cx="165" cy="55" r="2" fill="#10b981"/>
    <path d="M 30 115 L 31 117 L 33 117 L 31.5 118.5 L 32 121 L 30 119.5 L 28 121 L 28.5 118.5 L 27 117 L 29 117 Z" fill="#059669"/>
    <path d="M 170 110 L 171 112 L 173 112 L 171.5 113.5 L 172 116 L 170 114.5 L 168 116 L 168.5 113.5 L 167 112 L 169 112 Z" fill="#059669"/>
  </g>
</svg>