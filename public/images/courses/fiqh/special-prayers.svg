<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="specialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowSpecial">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#specialGrad)" opacity="0.1"/>
  
  <!-- Mosque Structure -->
  <g transform="translate(100, 110)" filter="url(#shadowSpecial)">
    <!-- Main Dome -->
    <ellipse cx="0" cy="-20" rx="30" ry="20" fill="url(#specialGrad)" opacity="0.9"/>
    <path d="M -30 -20 L -30 0 L 30 0 L 30 -20" fill="url(#specialGrad)" opacity="0.8"/>
    
    <!-- Crescent on top -->
    <g transform="translate(0, -40)">
      <circle cx="0" cy="0" r="6" fill="#fbbf24"/>
      <circle cx="2" cy="-0.5" r="5" fill="url(#specialGrad)"/>
      <circle cx="0" cy="-3" r="2" fill="#fbbf24"/>
    </g>
    
    <!-- Side Minarets -->
    <!-- Left Minaret -->
    <g transform="translate(-45, 0)">
      <rect x="-4" y="-35" width="8" height="35" fill="url(#specialGrad)" opacity="0.85"/>
      <ellipse cx="0" cy="-35" rx="5" ry="4" fill="url(#specialGrad)"/>
      <g transform="translate(0, -40)">
        <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
        <circle cx="1.5" cy="-0.3" r="3.5" fill="url(#specialGrad)"/>
      </g>
    </g>
    
    <!-- Right Minaret -->
    <g transform="translate(45, 0)">
      <rect x="-4" y="-35" width="8" height="35" fill="url(#specialGrad)" opacity="0.85"/>
      <ellipse cx="0" cy="-35" rx="5" ry="4" fill="url(#specialGrad)"/>
      <g transform="translate(0, -40)">
        <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
        <circle cx="1.5" cy="-0.3" r="3.5" fill="url(#specialGrad)"/>
      </g>
    </g>
    
    <!-- Entrance/Mihrab -->
    <rect x="-15" y="-5" width="30" height="20" rx="2" fill="url(#specialGrad)" opacity="0.7"/>
    <path d="M -10 -5 Q 0 -12, 10 -5" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Prayer Rows (Congregation) -->
  <g opacity="0.5">
    <rect x="40" y="145" width="120" height="3" rx="1.5" fill="url(#specialGrad)"/>
    <rect x="50" y="153" width="100" height="3" rx="1.5" fill="url(#specialGrad)"/>
    <rect x="60" y="161" width="80" height="3" rx="1.5" fill="url(#specialGrad)"/>
  </g>
  
  <!-- Decorative Stars -->
  <g opacity="0.4">
    <circle cx="60" cy="50" r="2" fill="#fbbf24"/>
    <circle cx="140" cy="55" r="2" fill="#fbbf24"/>
    <circle cx="50" cy="130" r="1.5" fill="#fbbf24"/>
    <circle cx="150" cy="125" r="1.5" fill="#fbbf24"/>
  </g>
</svg>