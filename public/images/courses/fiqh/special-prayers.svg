<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mosqueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#mosqueGrad)" opacity="0.08"/>
  
  <!-- Mosque -->
  <g transform="translate(100, 90)" filter="url(#shadow)">
    <!-- Main body -->
    <rect x="-35" y="0" width="70" height="40" fill="url(#mosqueGrad)"/>
    
    <!-- Main Dome -->
    <path d="M -35 0 Q -35 -25, 0 -30 Q 35 -25, 35 0 Z" fill="url(#mosqueGrad)"/>
    
    <!-- Crescent on dome -->
    <g transform="translate(0, -33)">
      <circle cx="0" cy="0" r="5" fill="url(#goldAccent)"/>
      <circle cx="1.5" cy="-0.5" r="4" fill="url(#mosqueGrad)"/>
      <!-- Pole -->
      <line x1="0" y1="5" x2="0" y2="3" stroke="url(#goldAccent)" stroke-width="1.5"/>
    </g>
    
    <!-- Left Minaret -->
    <g transform="translate(-48, 0)">
      <rect x="-5" y="-25" width="10" height="65" fill="url(#mosqueGrad)" opacity="0.95"/>
      <!-- Minaret dome -->
      <path d="M -5 -25 Q -5 -32, 0 -35 Q 5 -32, 5 -25 Z" fill="url(#mosqueGrad)"/>
      <!-- Crescent -->
      <circle cx="0" cy="-37" r="3" fill="url(#goldAccent)"/>
      <circle cx="1" cy="-37.5" r="2.5" fill="url(#mosqueGrad)"/>
      <!-- Balcony -->
      <rect x="-7" y="-15" width="14" height="2" rx="1" fill="url(#goldAccent)" opacity="0.8"/>
      <rect x="-7" y="-5" width="14" height="2" rx="1" fill="url(#goldAccent)" opacity="0.6"/>
    </g>
    
    <!-- Right Minaret -->
    <g transform="translate(48, 0)">
      <rect x="-5" y="-25" width="10" height="65" fill="url(#mosqueGrad)" opacity="0.95"/>
      <!-- Minaret dome -->
      <path d="M -5 -25 Q -5 -32, 0 -35 Q 5 -32, 5 -25 Z" fill="url(#mosqueGrad)"/>
      <!-- Crescent -->
      <circle cx="0" cy="-37" r="3" fill="url(#goldAccent)"/>
      <circle cx="1" cy="-37.5" r="2.5" fill="url(#mosqueGrad)"/>
      <!-- Balcony -->
      <rect x="-7" y="-15" width="14" height="2" rx="1" fill="url(#goldAccent)" opacity="0.8"/>
      <rect x="-7" y="-5" width="14" height="2" rx="1" fill="url(#goldAccent)" opacity="0.6"/>
    </g>
    
    <!-- Door arch -->
    <path d="M -10 40 L -10 20 Q -10 10, 0 10 Q 10 10, 10 20 L 10 40 Z" fill="url(#goldAccent)" opacity="0.7"/>
    <path d="M -8 40 L -8 22 Q -8 13, 0 13 Q 8 13, 8 22 L 8 40 Z" fill="url(#mosqueGrad)" opacity="0.3"/>
    
    <!-- Windows -->
    <path d="M -25 25 Q -25 18, -20 18 Q -15 18, -15 25 L -15 30 L -25 30 Z" fill="url(#goldAccent)" opacity="0.5"/>
    <path d="M 15 25 Q 15 18, 20 18 Q 25 18, 25 25 L 25 30 L 15 30 Z" fill="url(#goldAccent)" opacity="0.5"/>
  </g>
  
  <!-- Arabic text "الصلوات الخاصة" -->
  <text x="100" y="170" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        font-weight="600" 
        fill="url(#mosqueGrad)" 
        text-anchor="middle">الصلوات الخاصة</text>
  
  <!-- Decorative sparkles -->
  <g opacity="0.6">
    <path d="M 30 55 L 31 57 L 33 57 L 31.5 58.5 L 32 61 L 30 59.5 L 28 61 L 28.5 58.5 L 27 57 L 29 57 Z" fill="#fbbf24"/>
    <path d="M 170 60 L 171 62 L 173 62 L 171.5 63.5 L 172 66 L 170 64.5 L 168 66 L 168.5 63.5 L 167 62 L 169 62 Z" fill="#fbbf24"/>
    <circle cx="35" cy="130" r="2" fill="#10b981"/>
    <circle cx="165" cy="125" r="2" fill="#10b981"/>
  </g>
</svg>