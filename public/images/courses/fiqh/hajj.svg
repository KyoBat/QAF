<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="hajjGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowHajj">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#hajjGrad)" opacity="0.1"/>
  
  <!-- Kaaba -->
  <g transform="translate(100, 100)" filter="url(#shadowHajj)">
    <!-- Main structure -->
    <g>
      <!-- Back wall (slightly visible) -->
      <path d="M -25 -15 L -35 -5 L -35 35 L -25 25 Z" fill="url(#hajjGrad)" opacity="0.6"/>
      <!-- Right wall (slightly visible) -->
      <path d="M 25 -15 L 35 -5 L 35 35 L 25 25 Z" fill="url(#hajjGrad)" opacity="0.7"/>
      <!-- Front face -->
      <rect x="-25" y="-15" width="50" height="40" fill="url(#hajjGrad)" opacity="0.9"/>
      <!-- Top -->
      <path d="M -25 -15 L 0 -25 L 25 -15 L 0 -5 Z" fill="url(#hajjGrad)"/>
      
      <!-- Kiswa details (decorative bands) -->
      <rect x="-20" y="-5" width="40" height="3" fill="#fbbf24" opacity="0.8"/>
      <rect x="-20" y="15" width="40" height="3" fill="#fbbf24" opacity="0.8"/>
      
      <!-- Door -->
      <rect x="-8" y="5" width="16" height="20" rx="1" fill="#fbbf24" opacity="0.7"/>
      <line x1="-8" y1="5" x2="-8" y2="25" stroke="#064e3b" stroke-width="0.5"/>
      <line x1="8" y1="5" x2="8" y2="25" stroke="#064e3b" stroke-width="0.5"/>
    </g>
  </g>
  
  <!-- Tawaf circles (people circling Kaaba) -->
  <g opacity="0.4">
    <circle cx="100" cy="100" r="55" fill="none" stroke="url(#hajjGrad)" stroke-width="2" stroke-dasharray="5,5"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#hajjGrad)" stroke-width="1.5" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Pilgrims (simplified figures) -->
  <g filter="url(#shadowHajj)" opacity="0.7">
    <!-- Pilgrim 1 -->
    <circle cx="60" cy="100" r="4" fill="url(#hajjGrad)"/>
    <ellipse cx="60" cy="108" rx="3" ry="5" fill="url(#hajjGrad)"/>
    
    <!-- Pilgrim 2 -->
    <circle cx="140" cy="95" r="4" fill="url(#hajjGrad)"/>
    <ellipse cx="140" cy="103" rx="3" ry="5" fill="url(#hajjGrad)"/>
    
    <!-- Pilgrim 3 -->
    <circle cx="105" cy="60" r="3.5" fill="url(#hajjGrad)"/>
    <ellipse cx="105" cy="67" rx="2.5" ry="4" fill="url(#hajjGrad)"/>
    
    <!-- Pilgrim 4 -->
    <circle cx="95" cy="140" r="3.5" fill="url(#hajjGrad)"/>
    <ellipse cx="95" cy="147" rx="2.5" ry="4" fill="url(#hajjGrad)"/>
  </g>
  
  <!-- Sparkles/Light -->
  <g opacity="0.5">
    <circle cx="70" cy="50" r="2" fill="#fbbf24"/>
    <circle cx="130" cy="55" r="2" fill="#fbbf24"/>
    <circle cx="65" cy="150" r="1.5" fill="#fbbf24"/>
    <circle cx="135" cy="145" r="1.5" fill="#fbbf24"/>
  </g>
</svg>