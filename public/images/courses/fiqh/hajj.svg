<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="hajjGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="kaabaShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#hajjGrad)" opacity="0.1"/>
  
  <!-- Kaaba Structure -->
  <g filter="url(#kaabaShadow)">
    <!-- Main cube -->
    <g transform="translate(100, 95)">
      <!-- Top face -->
      <path d="M 0 -35 L -30 -20 L -30 15 L 0 0 L 30 15 L 30 -20 Z" fill="url(#hajjGrad)" opacity="0.8"/>
      
      <!-- Left face -->
      <path d="M -30 -20 L -30 15 L 0 30 L 0 -5 Z" fill="url(#hajjGrad)" opacity="0.95"/>
      
      <!-- Right face -->
      <path d="M 30 -20 L 30 15 L 0 30 L 0 -5 Z" fill="url(#hajjGrad)"/>
      
      <!-- Kiswa decorative band (golden) -->
      <rect x="-25" y="-5" width="50" height="4" fill="url(#goldAccent)" opacity="0.9"/>
      <rect x="-25" y="10" width="50" height="3" fill="url(#goldAccent)" opacity="0.8"/>
      
      <!-- Door (golden) -->
      <rect x="-8" y="5" width="16" height="20" rx="1" fill="url(#goldAccent)" opacity="0.85"/>
      <rect x="-7" y="6" width="14" height="18" rx="1" fill="none" stroke="#064e3b" stroke-width="0.5"/>
      <line x1="0" y1="6" x2="0" y2="24" stroke="#064e3b" stroke-width="0.5"/>
      
      <!-- Decorative patterns on sides -->
      <g opacity="0.5">
        <rect x="-22" y="2" width="8" height="8" fill="none" stroke="#10b981" stroke-width="0.5"/>
        <rect x="14" y="2" width="8" height="8" fill="none" stroke="#10b981" stroke-width="0.5"/>
      </g>
    </g>
  </g>
  
  <!-- Tawaf circles (people circling the Kaaba) -->
  <g opacity="0.3" fill="none" stroke="url(#hajjGrad)" stroke-width="2">
    <ellipse cx="100" cy="105" rx="50" ry="20" stroke-dasharray="8,6"/>
    <ellipse cx="100" cy="108" rx="65" ry="25" stroke-dasharray="8,6" opacity="0.7"/>
  </g>
  
  <!-- "HAJJ" text -->
  <g filter="url(#kaabaShadow)">
    <text x="100" y="50" 
          font-family="Arial, sans-serif" 
          font-size="34" 
          font-weight="bold" 
          fill="url(#hajjGrad)" 
          text-anchor="middle"
          stroke="#032f26"
          stroke-width="0.5">HAJJ</text>
    <text x="100" y="50" 
          font-family="Arial, sans-serif" 
          font-size="34" 
          font-weight="bold" 
          fill="url(#hajjGrad)" 
          text-anchor="middle">HAJJ</text>
  </g>
  
  <!-- "مكة" (Makkah) in Arabic -->
  <text x="100" y="170" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        font-weight="600" 
        fill="url(#hajjGrad)" 
        text-anchor="middle">مكة</text>
  
  <!-- Decorative stars/sparkles -->
  <g opacity="0.6">
    <path d="M 40 45 L 41.5 48 L 45 47 L 42 51 L 44 55 L 40 53 L 36 55 L 38 51 L 35 47 L 38.5 48 Z" fill="#10b981"/>
    <path d="M 160 50 L 161.5 53 L 165 52 L 162 56 L 164 60 L 160 58 L 156 60 L 158 56 L 155 52 L 158.5 53 Z" fill="#10b981"/>
    <circle cx="45" cy="150" r="2" fill="#047857"/>
    <circle cx="155" cy="145" r="2" fill="#047857"/>
  </g>
</svg>