<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="purificationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#purificationGrad)" opacity="0.1"/>
  
  <!-- Water Basin -->
  <g transform="translate(100, 120)" filter="url(#dropShadow)">
    <!-- Basin -->
    <path d="M -40 0 L -35 20 Q -35 25, -30 25 L 30 25 Q 35 25, 35 20 L 40 0 Z" 
          fill="url(#purificationGrad)" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="40" ry="8" fill="url(#purificationGrad)" opacity="0.9"/>
  </g>
  
  <!-- Water Drops -->
  <g filter="url(#dropShadow)">
    <!-- Large drop -->
    <path d="M 100 35 Q 85 50, 85 60 Q 85 72, 100 72 Q 115 72, 115 60 Q 115 50, 100 35 Z" 
          fill="url(#purificationGrad)"/>
    <!-- Medium drop -->
    <path d="M 70 50 Q 62 60, 62 66 Q 62 74, 70 74 Q 78 74, 78 66 Q 78 60, 70 50 Z" 
          fill="url(#purificationGrad)" opacity="0.8"/>
    <!-- Small drop -->
    <path d="M 130 55 Q 124 62, 124 67 Q 124 73, 130 73 Q 136 73, 136 67 Q 136 62, 130 55 Z" 
          fill="url(#purificationGrad)" opacity="0.7"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="60" cy="90" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="140" cy="85" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="50" cy="70" r="1.5" fill="#1e40af" opacity="0.5"/>
  <circle cx="150" cy="95" r="1.5" fill="#1e40af" opacity="0.5"/>
</svg>