<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="siyamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="moonGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#fbbf24" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="starGlow">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#siyamGrad)" opacity="0.08"/>
  
  <!-- Large Crescent Moon -->
  <g filter="url(#moonGlow)">
    <g transform="translate(100, 85)">
      <circle cx="0" cy="0" r="38" fill="url(#moonGrad)"/>
      <circle cx="12" cy="-8" r="32" fill="white" opacity="0.95"/>
      <!-- Moon surface details -->
      <circle cx="-15" cy="-5" r="3" fill="#fef3c7" opacity="0.4"/>
      <circle cx="-10" cy="10" r="2" fill="#fef3c7" opacity="0.3"/>
      <circle cx="-20" cy="5" r="1.5" fill="#fef3c7" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Stars -->
  <g filter="url(#shadow)">
    <!-- Large Star -->
    <g transform="translate(55, 55)">
      <circle cx="0" cy="0" r="10" fill="url(#starGlow)"/>
      <path d="M 0 -8 L 2 -2.5 L 8 -2 L 3 2 L 4 8 L 0 5 L -4 8 L -3 2 L -8 -2 L -2 -2.5 Z" fill="url(#moonGrad)"/>
    </g>
    
    <!-- Medium Star -->
    <g transform="translate(150, 60)">
      <circle cx="0" cy="0" r="7" fill="url(#starGlow)"/>
      <path d="M 0 -5.5 L 1.5 -2 L 5.5 -1.5 L 2 1.5 L 3 5.5 L 0 3.5 L -3 5.5 L -2 1.5 L -5.5 -1.5 L -1.5 -2 Z" fill="url(#moonGrad)"/>
    </g>

    <!-- Small Star -->
    <g transform="translate(50, 125)">
      <circle cx="0" cy="0" r="5" fill="url(#starGlow)"/>
      <path d="M 0 -4 L 1 -1.2 L 4 -1 L 1.5 1.2 L 2 4 L 0 2.5 L -2 4 L -1.5 1.2 L -4 -1 L -1 -1.2 Z" fill="url(#moonGrad)"/>
    </g>
    
    <!-- Small Star 2 -->
    <g transform="translate(155, 120)">
      <circle cx="0" cy="0" r="4" fill="url(#starGlow)"/>
      <path d="M 0 -3 L 0.7 -1 L 3 -0.7 L 1.2 1 L 1.5 3 L 0 2 L -1.5 3 L -1.2 1 L -3 -0.7 L -0.7 -1 Z" fill="url(#moonGrad)"/>
    </g>
  </g>
  
  <!-- Dot stars -->
  <circle cx="75" cy="45" r="1.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="135" cy="40" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="40" cy="90" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="160" cy="95" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="85" cy="35" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="120" cy="130" r="1" fill="#fbbf24" opacity="0.4"/>
  
  <!-- Arabic text "الصيام" -->
  <text x="100" y="165" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        font-weight="600" 
        fill="url(#siyamGrad)" 
        text-anchor="middle">الصيام</text>
  
  <!-- Decorative sparkles -->
  <g opacity="0.5">
    <path d="M 35 65 L 36 67 L 38 67 L 36.5 68.5 L 37 71 L 35 69.5 L 33 71 L 33.5 68.5 L 32 67 L 34 67 Z" fill="#fbbf24"/>
    <path d="M 165 80 L 166 82 L 168 82 L 166.5 83.5 L 167 86 L 165 84.5 L 163 86 L 163.5 83.5 L 162 82 L 164 82 Z" fill="#fbbf24"/>
  </g>
</svg>