<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="siyamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowSiyam">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="starGlow">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#siyamGrad)" opacity="0.1"/>
  
  <!-- Night Sky -->
  <circle cx="100" cy="100" r="75" fill="url(#siyamGrad)" opacity="0.15"/>
  
  <!-- Crescent Moon -->
  <g transform="translate(100, 90)" filter="url(#shadowSiyam)">
    <circle cx="0" cy="0" r="35" fill="url(#siyamGrad)"/>
    <circle cx="8" cy="-3" r="30" fill="#fff" opacity="0.95"/>
  </g>
  
  <!-- Stars -->
  <g opacity="0.8">
    <!-- Star 1 -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="8" fill="url(#starGlow)" opacity="0.3"/>
      <path d="M 0 -6 L 1.5 -1.5 L 7 -1 L 2 3 L 3 8 L 0 5 L -3 8 L -2 3 L -7 -1 L -1.5 -1.5 Z" fill="#fbbf24"/>
    </g>
    <!-- Star 2 -->
    <g transform="translate(150, 60)">
      <circle cx="0" cy="0" r="6" fill="url(#starGlow)" opacity="0.3"/>
      <path d="M 0 -4 L 1 -1 L 5 -0.5 L 1.5 2 L 2 5 L 0 3 L -2 5 L -1.5 2 L -5 -0.5 L -1 -1 Z" fill="#fbbf24"/>
    </g>
    <!-- Star 3 -->
    <g transform="translate(45, 130)">
      <circle cx="0" cy="0" r="5" fill="url(#starGlow)" opacity="0.3"/>
      <path d="M 0 -3 L 0.7 -0.7 L 3.5 -0.3 L 1 1.3 L 1.3 3.5 L 0 2 L -1.3 3.5 L -1 1.3 L -3.5 -0.3 L -0.7 -0.7 Z" fill="#fbbf24"/>
    </g>
    <!-- Star 4 -->
    <g transform="translate(155, 125)">
      <circle cx="0" cy="0" r="4" fill="url(#starGlow)" opacity="0.3"/>
      <path d="M 0 -2.5 L 0.5 -0.5 L 2.5 -0.2 L 0.7 1 L 1 2.5 L 0 1.5 L -1 2.5 L -0.7 1 L -2.5 -0.2 L -0.5 -0.5 Z" fill="#fbbf24"/>
    </g>
  </g>
  
  <!-- Small stars (dots) -->
  <circle cx="70" cy="75" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="130" cy="85" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="60" cy="110" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="140" cy="105" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="85" cy="55" r="1" fill="#fbbf24" opacity="0.5"/>
</svg>